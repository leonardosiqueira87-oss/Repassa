<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repassa Pelotas - Competição</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 4px solid #facc15; color: white !important; background: rgba(255,255,255,0.1); transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-28">

    <header class="bg-slate-900 text-white p-6 pt-10 shadow-2xl sticky top-0 z-50 rounded-b-[2.5rem] border-b-4 border-yellow-400">
        <div class="max-w-md mx-auto flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-yellow-400">REPASSA <span class="text-white font-light">PELOTAS</span></h1>
                <p class="text-[9px] opacity-70 font-bold uppercase tracking-[0.3em]">Gestão de Indicações</p>
            </div>
            <div class="text-right">
                <button onclick="exportarRelatorio()" class="bg-white/10 p-2 rounded-xl border border-white/20 active:scale-90 transition">
                   <span class="text-[10px] font-bold">RELATÓRIO</span>
                </button>
            </div>
        </div>

        <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide px-1" id="abasVendedores">
            </div>
    </header>

    <div class="max-w-md mx-auto px-5 mt-6 space-y-6">
        
        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Top Repassa</h3>
                <span class="text-[10px] font-bold text-yellow-600 bg-yellow-50 px-2 py-0.5 rounded-full" id="totalGeralIdc">0 Indicações</span>
            </div>
            <div id="podium" class="space-y-2"></div>
        </section>

        <section id="painelVendedor" class="bg-white p-8 rounded-[2.5rem] shadow-xl border-t-8 border-slate-900 hidden animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <span id="iconeAtivo" class="text-5xl mb-2 block animate-bounce"></span>
                    <h2 id="nomeAtivo" class="text-3xl font-black text-slate-950 uppercase italic tracking-tighter">---</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Indicações</p>
                    <p id="scoreAtivo" class="text-5xl font-black text-slate-900">0</p>
                </div>
            </div>

            <div class="bg-slate-50 p-5 rounded-3xl mb-8 flex justify-between items-center border border-slate-100 shadow-inner">
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Prêmio Acumulado</p>
                    <p id="premioAtivo" class="text-2xl font-black text-emerald-600">R$ 0,00</p>
                </div>
                <div class="text-[10px] font-bold text-slate-400 text-right">
                    Valor/IDC:<br><span id="valUnitDisplay" class="text-slate-900 font-black">R$ 0,00</span>
                </div>
            </div>

            <button onclick="registrar()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-black py-6 rounded-[2rem] shadow-lg shadow-yellow-100 active:scale-95 transition-all text-sm uppercase tracking-[0.2em]">
                ✨ REGISTRAR INDICAÇÃO
            </button>
        </section>

        <section id="sessaoHistorico" class="hidden pb-12">
            <div class="flex justify-between items-center px-2 mb-4">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Linha do Tempo</h3>
                <button onclick="limparCompetidor()" class="text-[9px] font-bold text-rose-400">Zerar Vendedor</button>
            </div>
            <div id="lista" class="space-y-3"></div>
        </section>
    </div>

    <script>
        /** * ==========================================
         * PAINEL DE CONTROLE (EDITE AQUI ABAIXO)
         * ==========================================
         */
        
        // 1. Adicione ou remova nomes e ícones à vontade:
        const LISTA_VENDEDORES = [
            { nome: "Lis", icone: "🌸" },
            { nome: "Duda", icone: "✨" },
            { nome: "Roberta", icone: "💎" },
            { nome: "Matheus", icone: "⚡" },
            { nome: "Denis", icone: "🎯" }
        ];

        // 2. Edite o valor de cada indicação (em Reais):
        const PREMIO_POR_INDICACAO = 30.00; 

        /** ========================================== */

        let dados = JSON.parse(localStorage.getItem('repassa_pelotas_v1')) || {};
        let ativo = null;

        // Iniciar ou atualizar banco de dados
        LISTA_VENDEDORES.forEach(v => { if (!dados[v.nome]) dados[v.nome] = { pts: 0, logs: [] }; });

        function atualizar() {
            // Abas
            const abas = document.getElementById('abasVendedores');
            abas.innerHTML = '';
            LISTA_VENDEDORES.forEach(v => {
                const isSelected = ativo === v.nome;
                abas.innerHTML += `
                    <button onclick="selecionar('${v.nome}')" class="flex-shrink-0 px-6 py-4 rounded-3xl flex flex-col items-center gap-1 transition-all ${isSelected ? 'tab-active' : 'opacity-50'}">
                        <span class="text-2xl">${v.icone}</span>
                        <span class="text-[10px] font-black uppercase tracking-tighter">${v.nome}</span>
                    </button>`;
            });

            // Ranking
            const podium = document.getElementById('podium');
            const ranking = LISTA_VENDEDORES.map(v => ({...v, pts: dados[v.nome].pts})).sort((a,b) => b.pts - a.pts);
            let totalGeral = 0;
            podium.innerHTML = '';
            ranking.forEach((v, i) => {
                totalGeral += v.pts;
                podium.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="flex items-center gap-4">
                            <span class="font-black w-6 text-center ${i===0?'text-yellow-500':'text-slate-300'}">${i+1}º</span>
                            <span class="text-xl">${v.icone}</span>
                            <span class="font-extrabold text-sm text-slate-700">${v.nome}</span>
                        </div>
                        <span class="font-black text-slate-900">${v.pts} <span class="text-[8px] text-slate-400">IDC</span></span>
                    </div>`;
            });
            document.getElementById('totalGeralIdc').innerText = totalGeral + " Indicações Total";

            // Painel
            if (ativo) {
                const user = LISTA_VENDEDORES.find(v => v.nome === ativo);
                document.getElementById('painelVendedor').classList.remove('hidden');
                document.getElementById('sessaoHistorico').classList.remove('hidden');
                document.getElementById('nomeAtivo').innerText = ativo;
                document.getElementById('iconeAtivo').innerText = user.icone;
                document.getElementById('scoreAtivo').innerText = dados[ativo].pts;
                document.getElementById('valUnitDisplay').innerText = "R$ " + PREMIO_POR_INDICACAO.toFixed(2);
                document.getElementById('premioAtivo').innerText = "R$ " + (dados[ativo].pts * PREMIO_POR_INDICACAO).toLocaleString('pt-BR', {minimumFractionDigits:2});

                const lista = document.getElementById('lista');
                lista.innerHTML = '';
                dados[ativo].logs.forEach((log, i) => {
                    lista.innerHTML += `
                        <div class="flex justify-between items-center bg-white p-5 rounded-3xl shadow-sm border border-slate-50">
                            <div>
                                <p class="font-black text-slate-800 text-sm">Registro #${dados[ativo].pts - i}</p>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${log.data}</p>
                            </div>
                            <button onclick="remover(${i})" class="text-[9px] font-black text-rose-300 border border-rose-50 px-2 py-1 rounded-lg">ESTORNAR</button>
                        </div>`;
                });
            }
            localStorage.setItem('repassa_pelotas_v1', JSON.stringify(dados));
        }

        function selecionar(nome) { ativo = nome; atualizar(); }

        function registrar() {
            if(!ativo) return;
            dados[ativo].pts += 1;
            dados[ativo].logs.unshift({ data: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'}) });
            atualizar();
        }

        function remover(i) {
            if(confirm("Confirmar estorno desta indicação?")) {
                dados[ativo].pts -= 1;
                dados[ativo].logs.splice(i, 1);
                atualizar();
            }
        }

        function limparCompetidor() {
            if(confirm(`Zerar TODOS os pontos de ${ativo}? Isso não pode ser desfeito.`)) {
                dados[ativo].pts = 0;
                dados[ativo].logs = [];
                atualizar();
            }
        }

        function exportarRelatorio() {
            let csv = "Vendedor;Indicacoes;Premio Total (R$)\n";
            LISTA_VENDEDORES.forEach(v => {
                const p = dados[v.nome].pts;
                csv += `${v.nome};${p};${(p * PREMIO_POR_INDICACAO).toFixed(2)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "REPASSA_PELOTAS_RELATORIO.csv";
            link.click();
        }

        atualizar();
    </script>
</body>
</html>
